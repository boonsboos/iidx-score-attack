<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Choose a bracket | IIDX NL Accuracy Arena</title>

    <meta property="og:title" content="IIDX NL Accuracy Arena" />
    <meta
      property="og:description"
      content="A beatmania IIDX highscore competition."
    />
    <meta property="og:url" content="https://iidx.otoge.win/scores" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/static/v.css" />
  </head>
  <body>
    <div class="container gap-3 d-flex flex-column">
      <div class="pt-4">
        <a class="text-decoration-none text-light-emphasis" href="/">
          <h1 class="display-2">IIDX NL Accuracy Arena</h1>
          <p class="lead">A beatmania IIDX highscore competition.</p>
        </a>
      </div>

      <hr />
      <div>
        <h2>Bracket Select</h2>
        <p>Choose a bracket to view the scores.</p>

        <a class="btn btn-success" href="/scores/lower">Lower bracket</a>
        <a class="btn btn-primary" href="/scores/upper">Upper bracket</a>
        <a class="btn btn-danger" href="/scores/master">Master bracket</a>
      </div>

      <p>
        Someday this will be a list of old brackets so you can view their
        scores...
      </p>
    </div>

    {{ template "footer" }}

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
