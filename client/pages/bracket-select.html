<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IIDX Score Aanval</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/static/v.css" />
  </head>
  <body>
    <div class="container gap-3 d-flex flex-column">
      <div>
        <a class="text-decoration-none text-light-emphasis" href="/">
          <h1 class="display-2">IIDX Score Aanval</h1>
          <p class="lead">Een beatmania IIDX highscore competitie.</p>
        </a>
      </div>

      <hr />
      <div>
        <h2>Bracket Select</h2>
        <p>Kies een bracket om de scores te bekijken.</p>

        <a class="btn btn-primary" href="/scores/lower">Lower bracket</a>
        <a class="btn btn-primary" href="/scores/upper">Upper bracket</a>
      </div>

      <p>
        Ooit komt hier een lijst met oude brackets zodat je daar de scores van
        kunt zien...
      </p>
    </div>

    {{ template "footer" }}

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
