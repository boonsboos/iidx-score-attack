<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IIDX NL Score Clash</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container gap-3 d-flex flex-column">
      <div class="pt-4">
        <h1 class="display-2">IIDX NL Score Clash</h1>
        <p class="lead">A beatmania IIDX highscore competition.</p>
      </div>
      <div class="d-flex justify-content-center align-items-center">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Signed up!</h5>
            <p class="card-text">
              Welcome, {{.DJName}}! Have fun attacking those scores :D
            </p>
            <p>
              You can now start playing, your scores will be automatically
              synchronized with the site!
            </p>
            <a href="/" class="btn btn-primary">Back to home</a>
          </div>
        </div>
      </div>
    </div>

    {{ template "footer" }}

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
