<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IIDX Score Aanval</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container gap-3 d-flex flex-column">
      <div>
        <h1 class="display-2">IIDX Score Aanval</h1>
      </div>
      <div class="d-flex justify-content-center align-items-center">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Aangemeld!</h5>
            <p class="card-text">
              Welkom, {{.DJName}}! Veel success met het aanvallen van scores :D
            </p>
            <p>
              Je kunt nu gaan spelen, je scores worden automatisch
              gesynchroniseerd met de site!
            </p>
            <a href="/" class="btn btn-primary">Terug naar home</a>
          </div>
        </div>
      </div>
    </div>

    {{ template "footer" }}

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
