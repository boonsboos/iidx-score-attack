<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scores | IIDX Nederland Score Aanval</title>

    <meta property="og:title" content="Scores | IIDX Nederland Score Attack" />
    <meta
      property="og:description"
      content="Een beatmania IIDX highscore competitie."
    />
    <meta property="og:url" content="https://iidx.otoge.win/scores" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/static/v.css" />  
  </head>
  <body>
    <div class="container gap-3 d-flex flex-column">
      <div class="pt-4">
        <a class="text-decoration-none text-light-emphasis" href="/">
          <h1 class="display-2">IIDX Nederland Score Aanval</h1>
        </a>
        <p class="lead">Een beatmania IIDX highscore competitie.</p>
      </div>

      <hr />

      <h2>Scores</h2>

      <table
        id="lower-bracket-table"
        class="table table-striped table-hover sortable"
      >
        <thead>
          <tr>
            <th>DJ Name</th>
            <th>Rating</th>
            {{ range .BracketCharts }}
            <th id="{{ .TitleLatinized }}-{{ .ChartLevel }}">
              <abbr title="{{ .TitleLatinized }}">
                <div {{ if eq .ChartType "boss" }} class="text-warning" {{end}}>
                  {{ .Title }}
                </div>
                <div>{{ .ChartLevel }}</div>
              </abbr>
            </th>
            {{ end }}
          </tr>
        </thead>
        <tbody>
          {{ range .Bracket }} {{ template "score-row" . }} {{ end }}
        </tbody>
      </table>
    </div>

    {{ template "footer" }}

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script src="https://cdn.jsdelivr.net/gh/tofsjonas/sortable@4.1.7/dist/sortable.min.js"></script>
  </body>
</html>
